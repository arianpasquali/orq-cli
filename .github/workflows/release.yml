name: Release

# Fires when you publish a GitHub Release. Draft releases do not trigger; the
# tag name (e.g. v0.1.0) becomes the published semver after stripping the `v`.
on:
  release:
    types: [published]

# Only one release run at a time. If you hit "re-run" on a finished release
# it cancels any earlier in-flight workflow for the same tag.
concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  release:
    # macOS runner so `codesign` is available for ad-hoc signing of the two
    # darwin binaries. Cross-compile targets for linux/windows still work
    # fine on macOS — Go's cross toolchain doesn't need a matching host OS.
    runs-on: macos-latest

    permissions:
      contents: write # upload release assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Resolve version
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Release tag: $tag → npm version: $version"

      - name: Build all platform binaries
        run: ./scripts/release-build.sh "${{ steps.version.outputs.version }}"

      - name: Dry-run publish wrapper package
        run: |
          cd npm/cli
          npm publish --access public --dry-run

      - name: Publish platform packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          for pkgdir in npm/cli-*/; do
            echo "=== Publishing $(basename "$pkgdir") ==="
            (cd "$pkgdir" && npm publish --access public)
          done

      - name: Publish wrapper package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/cli
          echo "=== Publishing @orq-ai/cli ==="
          npm publish --access public

      - name: Stage raw binaries for GitHub Release
        run: |
          set -e
          mkdir -p dist
          for pkgdir in npm/cli-*/; do
            name="$(basename "$pkgdir")"
            target="${name#cli-}"
            if [ "$target" = "win32-x64" ]; then
              cp "$pkgdir/bin/orq.exe" "dist/orq-$target.exe"
            else
              cp "$pkgdir/bin/orq" "dist/orq-$target"
            fi
          done
          ls -la dist/

      - name: Upload raw binaries to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" dist/orq-* --clobber
